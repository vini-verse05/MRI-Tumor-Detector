services:
  - type: web
    name: mri-tumor-detector
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: AES_SECRET_KEY
        sync: false        # you will set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.6
