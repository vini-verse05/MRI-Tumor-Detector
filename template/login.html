<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Medical AI - Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #1a2a4a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 380px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      h2 {
        color: #1f4e79;
        text-align: center;
        margin-bottom: 5px;
      }
      p.subtitle {
        color: #888;
        text-align: center;
        font-size: 13px;
      }
      label {
        font-size: 14px;
        color: #444;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 6px 0 16px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 13px;
        background: #1f4e79;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
      }
      button:hover {
        background: #2e75b6;
      }
      .flash {
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 14px;
      }
      .success {
        background: #d4edda;
        color: #155724;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
      }
      .hint {
        text-align: center;
        font-size: 12px;
        color: #aaa;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>🧠 Medical AI System</h2>
      <p class="subtitle">Secure Brain MRI Diagnosis</p>

      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, msg in messages %}
      <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %} {% endwith %}

      <form method="POST">
        <label>Username</label>
        <input
          type="text"
          name="username"
          placeholder="e.g. doctor1"
          required
        />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login Securely 🔒</button>
      </form>

      <p class="hint">Contact your system administrator for access credentials.</p>
    </div>
  </body>
</html>
